<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f0; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 14px 20px; background: white; border-bottom: 1px solid #e8e8e0; display: flex; align-items: center; gap: 10px; }
.logo { width: 32px; height: 32px; border-radius: 8px; background: #1D9E75; display: flex; align-items: center; justify-content: center; }
.logo svg { width: 18px; height: 18px; fill: white; }
.header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.header-sub { font-size: 12px; color: #888; margin-left: auto; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.main { display: flex; flex: 1; overflow: hidden; }
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 10px; max-width: 80%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }
.avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.msg.bot .avatar { background: #E1F5EE; color: #0F6E56; }
.msg.user .avatar { background: #E6F1FB; color: #185FA5; }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; border: 1px solid #e8e8e0; }
.msg.bot .bubble { background: white; border-radius: 4px 12px 12px 12px; color: #1a1a1a; }
.msg.user .bubble { background: #E6F1FB; color: #0C447C; border-radius: 12px 4px 12px 12px; border-color: #B5D4F4; }
.sources { margin-top: 8px; padding: 8px 10px; background: #f9f9f7; border-radius: 8px; border: 1px solid #e8e8e0; font-size: 12px; }
.sources-title { color: #666; margin-bottom: 6px; font-weight: 600; }
.source-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; color: #666; border-bottom: 1px solid #e8e8e0; }
.source-item:last-child { border-bottom: none; }
.score-bar { height: 4px; background: #9FE1CB; border-radius: 2px; }
.typing { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; animation: bounce 1s infinite; }
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.input-area { padding: 14px 20px; background: white; border-top: 1px solid #e8e8e0; }
.input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea { flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid #ddd; background: #f9f9f7; font-family: inherit; font-size: 14px; color: #1a1a1a; resize: none; min-height: 42px; max-height: 120px; line-height: 1.5; outline: none; }
textarea:focus { border-color: #1D9E75; }
textarea::placeholder { color: #aaa; }
.send-btn { width: 42px; height: 42px; border-radius: 10px; background: #1D9E75; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
.send-btn:hover { background: #0F6E56; }
.send-btn:disabled { background: #e8e8e0; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.send-btn:disabled svg { fill: #aaa; }
.hint { font-size: 11px; color: #aaa; margin-top: 6px; text-align: center; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #888; }
.empty-icon { width: 48px; height: 48px; border-radius: 12px; background: #E1F5EE; display: flex; align-items: center; justify-content: center; }
.empty-icon svg { width: 24px; height: 24px; fill: #1D9E75; }
.empty-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
.chip { padding: 6px 12px; border-radius: 99px; border: 1px solid #ddd; background: white; font-size: 12px; color: #666; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
.chip:hover { border-color: #1D9E75; color: #0F6E56; }
.error-msg { color: #993C1D; }
</style>
</head>
<body>
<div class="header">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
  <span class="header-title">RAG Chat</span>
  <span class="header-sub"><span class="status-dot"></span>서버 연결됨</span>
</div>
<div class="main">
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        <div class="empty-title">무엇이든 물어보세요</div>
        <div style="font-size:13px">업로드된 문서 기반으로 답변합니다</div>
        <div class="chips">
          <div class="chip" onclick="setQ('RAG가 무엇인가요?')">RAG가 무엇인가요?</div>
          <div class="chip" onclick="setQ('BGE-M3 모델의 특징은?')">BGE-M3 모델의 특징은?</div>
          <div class="chip" onclick="setQ('Qdrant는 어떤 DB인가요?')">Qdrant는 어떤 DB인가요?</div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="질문을 입력하세요... (Shift+Enter 줄바꿈)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="hint">BGE-M3 임베딩 · Llama 3.1 · Qdrant</div>
    </div>
  </div>
</div>
<script>
const API_URL = 'https://rag-api.onrender.com'; // 본인 URL로 변경
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let isLoading = false;

function setQ(q) { inputEl.value = q; inputEl.focus(); }

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function addMsg(role, content, sources) {
  document.getElementById('empty').style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const initial = role === 'bot' ? 'AI' : '나';
  let sourcesHtml = '';
  if (sources && sources.length > 0) {
    const items = sources.map(s => {
      const pct = Math.round(s.score * 100);
      return `<div class="source-item"><div style="flex:1"><div style="margin-bottom:3px">${s.text.substring(0,60)}...</div><div class="score-bar" style="width:${pct}%"></div></div><span style="font-size:11px;color:#aaa;flex-shrink:0">${pct}%</span></div>`;
    }).join('');
    sourcesHtml = `<div class="sources"><div class="sources-title">참고 문서 ${sources.length}건</div>${items}</div>`;
  }
  div.innerHTML = `<div class="avatar">${initial}</div><div><div class="bubble">${content}</div>${sourcesHtml}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-msg';
  div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing-msg'); if (t) t.remove(); }

async function sendMsg() {
  const q = inputEl.value.trim();
  if (!q || isLoading) return;
  isLoading = true; sendBtn.disabled = true;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addMsg('user', q); addTyping();
  try {
    const res = await fetch(`${API_URL}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, top_k: 3 })
    });
    const data = await res.json();
    removeTyping();
    if (!res.ok) {
      addMsg('bot', `<span class="error-msg">오류: ${data.detail || '서버 오류'}</span>`);
    } else {
      addMsg('bot', data.answer, data.sources);
    }
  } catch(e) {
    removeTyping();
    addMsg('bot', '<span class="error-msg">서버에 연결할 수 없습니다.</span>');
  }
  isLoading = false; sendBtn.disabled = false; inputEl.focus();
}
</script>
</body>
</html>
